name: namaz_near_me
description: Android-first nearby masjid and jamaat timing app for Moradabad.
publish_to: "none"
version: 1.0.9+10

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  flutter:
    sdk: flutter
  geolocator: ^14.0.2
  url_launcher: ^6.3.1
  http: ^1.2.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
