name: namaz_near_me
description: Android-first nearby masjid and jamaat timing app for Moradabad.
publish_to: "none"
version: 1.3.0+23

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  cloud_firestore: ^6.4.1
  firebase_app_check: ^0.4.4+2
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  flutter:
    sdk: flutter
  geolocator: ^14.0.2
  url_launcher: ^6.3.1
  http: ^1.2.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  flutter_timezone: ^5.1.0
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.1
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  gal: ^1.1.0
  shared_preferences: ^2.3.2
  in_app_review: ^2.0.9
  provider: ^6.1.2
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/namaz-near-me-icon.png
  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-Variable.ttf
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lato-Italic.ttf
          style: italic
        - asset: assets/fonts/Lato-BoldItalic.ttf
          weight: 700
          style: italic
    - family: GreatVibes
      fonts:
        - asset: assets/fonts/GreatVibes-Regular.ttf
  generate: true
